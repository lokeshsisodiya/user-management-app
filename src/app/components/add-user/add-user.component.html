<div class="modal-overlay" (click)="close()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>Add New User</h2>
      <button class="close-btn" (click)="close()">×</button>
    </div>

    <div class="modal-body">
      <div class="form-group" [ngClass]="{'has-error': showNameError()}">
        <label for="name">
          Full Name <span class="required-star">*</span>
        </label>
        <input 
          id="name"
          type="text" 
          [(ngModel)]="newUser.name" 
          placeholder="Enter user name (letters only)"
          (keyup.enter)="addUser()"
          (blur)="validateField('name')"
          (input)="validateNameInput($event)"
          (keydown)="preventInvalidKeys($event)"
          autofocus
          maxlength="100"
        >
        <small class="error-message" *ngIf="showNameError()">
          {{ getNameErrorMessage() }}
        </small>
        <small class="char-counter" *ngIf="newUser.name">
          {{ newUser.name.length }}/100
        </small>
      </div>

      <div class="form-group" [ngClass]="{'has-error': showRoleError()}">
        <label for="role">
          Role <span class="required-star">*</span>
        </label>
        <select 
          id="role" 
          [(ngModel)]="newUser.role"
          (blur)="validateField('role')"
        >
          <option value="">Select Role</option>
          <option value="Developer">Developer</option>
          <option value="Designer">Designer</option>
          <option value="Manager">Manager</option>
          <option value="Tester">Tester</option>
          <option value="HR">HR</option>
        </select>
        <small class="error-message" *ngIf="showRoleError()">
          Please select a role
        </small>
      </div>

      <div class="form-error-summary" *ngIf="isFormInvalid() && isFormTouched">
        <p>Please fill all required fields correctly</p>
      </div>
    </div>

    <div class="modal-footer">
      <button class="cancel-btn" (click)="close()">Cancel</button>
      <button 
        class="save-btn" 
        (click)="addUser()"
        [disabled]="!isFormValid()"
      >
        Create User
      </button>
    </div>
  </div>
</div>
