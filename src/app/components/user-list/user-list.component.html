<div class="container">
  <h2>User Management</h2>
  
  <div *ngIf="isLoading" class="loading-spinner">
    Loading users... ⏳
  </div>
  <div class="add-user-section">
    <button 
      class="open-modal-btn" 
      (click)="openAddUserModal()"
      [disabled]="isAdding || isLoading"
    >
      <span class="plus-icon">+</span> 
      {{ isAdding ? 'Adding...' : 'Add New User' }}
    </button>
  </div>
  <app-add-user 
    *ngIf="showAddUserModal"
    (userAdded)="addNewUser($event)"
    (closeModal)="closeAddUserModal()"
  ></app-add-user>
  <div class="search-box">
    <input 
      type="text" 
      placeholder="Search by name..." 
      [(ngModel)]="searchText"
      (input)="searchUsers()"
      [disabled]="isLoading"
    >
    <button 
      (click)="sortUsers()"
      [disabled]="isLoading || filteredUsers.length === 0"
    >
      Sort by Name ({{ sortAscending ? 'A to Z' : 'Z to A' }})
    </button>
    
    <span *ngIf="isSearching" class="searching-text">
      Searching...
    </span>
  </div>

  <table class="user-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Role</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngIf="isLoading">
        <td colspan="4" class="text-center">
          Loading users... Please wait.
        </td>
      </tr>
      
      <tr *ngIf="!isLoading && filteredUsers.length === 0">
        <td colspan="4" class="text-center">
          No users found
        </td>
      </tr>
      
      <tr *ngFor="let user of filteredUsers">
        <td>{{ user.id }}</td>
        <td>{{ user.name }}</td>
        <td>{{ user.role }}</td>
        <td>
          <button 
            class="delete-btn" 
            (click)="deleteUser(user.id)"
            [disabled]="isLoading"
          >
            Delete
          </button>
        </td>
      </tr>
    </tbody>
  </table>
  <div class="role-filters" *ngIf="!isLoading">
    <button (click)="filterByRole('Developer')">Developers</button>
    <button (click)="filterByRole('Designer')">Designers</button>
    <button (click)="filterByRole('Manager')">Managers</button>
    <button (click)="loadUsers()">All Users</button>
  </div>
</div>
