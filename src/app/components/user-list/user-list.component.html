<div class="container">
  <h2>User Management</h2>

  <div class="loading-overlay" *ngIf="isLoading">
    <div class="spinner"></div>
    <p>Loading users...</p>
  </div>

  <div class="add-user-section">
    <button 
      class="open-modal-btn" 
      (click)="openAddUserModal()"
      [disabled]="isAdding"
    >
      <span class="button-content">
        <span class="plus-icon" *ngIf="!isAdding">+</span>
        <span class="button-spinner" *ngIf="isAdding"></span>
        {{ isAdding ? 'Adding...' : 'Add New User' }}
      </span>
    </button>
  </div>
  <app-add-user 
    *ngIf="showAddUserModal"
    (userAdded)="addNewUser($event)"
    (closeModal)="closeAddUserModal()"
  ></app-add-user>
  <div class="search-box">
    <input 
      type="text" 
      placeholder="Search by name..." 
      [(ngModel)]="searchText"
      (input)="searchUsers()"
      [disabled]="isLoading"
    >
    <button 
      (click)="sortUsers()"
      [disabled]="isLoading"
    >
      Sort by Name ({{ sortAscending ? 'A to Z' : 'Z to A' }})
    </button>
  </div>

  <div class="error-message" *ngIf="loadingError">
    {{ loadingError }}
    <button (click)="loadUsers()">Retry</button>
  </div>

  <table class="user-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Role</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngIf="isLoading" class="loading-row">
        <td colspan="4">
          <div class="table-loader">
            <div class="spinner"></div>
            <span>Fetching users...</span>
          </div>
        </td>
      </tr>

      <tr *ngIf="!isLoading && filteredUsers.length === 0">
        <td colspan="4" class="no-data">
          <div class="no-data-content">
            <span class="no-data-icon"></span>
            <p>No users found</p>
            <button class="add-first-btn" (click)="openAddUserModal()">
              Add First User
            </button>
          </div>
        </td>
      </tr>
      <ng-container *ngIf="!isLoading">
        <tr *ngFor="let user of filteredUsers">
          <td>{{ user.id }}</td>
          <td>{{ user.name }}</td>
          <td>{{ user.role }}</td>
          <td>
            <button 
              (click)="deleteUser(user.id)" 
              class="delete-btn"
              [disabled]="isDeleting"
            >
              <span *ngIf="isDeleting" class="small-spinner"></span>
              <span *ngIf="!isDeleting">Delete</span>
            </button>
          </td>
        </tr>
      </ng-container>
    </tbody>
  </table>
  <div class="role-filters" *ngIf="!isLoading">
    <button (click)="filterByRole('Developer')">Developers</button>
    <button (click)="filterByRole('Designer')">Designers</button>
    <button (click)="filterByRole('Manager')">Managers</button>
    <button (click)="loadUsers()">All Users</button>
  </div>
  <div class="loading-more" *ngIf="isLoading && users.length > 0">
    <div class="spinner small"></div>
    <span>Updating list...</span>
  </div>
</div>
