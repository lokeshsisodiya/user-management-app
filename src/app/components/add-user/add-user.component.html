
<div class="add-user-page">
  <div class="page-container">
    <div class="page-header">
      <h2>Add New User</h2>
      <button class="back-btn" (click)="close()" mat-button>
        <mat-icon>arrow_back</mat-icon>
        Back to Users
      </button>
    </div>

    <div class="form-container">
      <div class="loading-overlay" *ngIf="isAdding">
        <div class="spinner"></div>
        <p>Adding user...</p>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
        <button (click)="addUser()" mat-button color="primary">Retry</button>
      </div>

      <div class="form-group" [ngClass]="{'has-error': showNameError()}">
        <label for="name">
          Full Name <span class="required-star">*</span>
        </label>
        <input 
          id="name"
          type="text" 
          [(ngModel)]="newUser.name" 
          placeholder="Enter user name (letters only)"
          (keyup.enter)="addUser()"
          (blur)="validateField('name')"
          (input)="validateNameInput($event)"
          (keydown)="preventInvalidKeys($event)"
          autofocus
          maxlength="100"
          [disabled]="isAdding"
        >
        <small class="error-message" *ngIf="showNameError()">
          {{ getNameErrorMessage() }}
        </small>
        <small class="char-counter" *ngIf="newUser.name">
          {{ newUser.name.length }}/100
        </small>
      </div>

      <div class="form-group" [ngClass]="{'has-error': showRoleError()}">
        <label for="role">
          Role <span class="required-star">*</span>
        </label>
        <select 
          id="role" 
          [(ngModel)]="newUser.role"
          (blur)="validateField('role')"
          [disabled]="isAdding"
        >
          <option value="">Select Role</option>
          <option value="Developer">Developer</option>
          <option value="Designer">Designer</option>
          <option value="Manager">Manager</option>
          <option value="Tester">Tester</option>
          <option value="HR">HR</option>
        </select>
        <small class="error-message" *ngIf="showRoleError()">
          Please select a role
        </small>
      </div>

      <div class="form-error-summary" *ngIf="isFormInvalid() && isFormTouched">
        <p>Please fill all required fields correctly</p>
      </div>

      <div class="form-actions">
        <button class="cancel-btn" (click)="close()" [disabled]="isAdding" mat-button>
          Cancel
        </button>
        <button 
          class="save-btn" 
          (click)="addUser()"
          [disabled]="!isFormValid() || isAdding"
          mat-raised-button
          color="primary"
        >
          <span *ngIf="!isAdding">Create User</span>
          <span *ngIf="isAdding">Creating...</span>
        </button>
      </div>
    </div>
  </div>
</div>
